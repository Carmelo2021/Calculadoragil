<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gastos Flash</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ecc71">
    
    <style>
        :root {
            --bg: #f0f2f5;
            --primary: #2ecc71;
            --text: #1a1a1a;
            --card: #ffffff;
            --gray: #95a5a6;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .widget-card {
            background: var(--card);
            width: 90%;
            max-width: 360px;
            padding: 25px;
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .select-wrapper {
            margin-bottom: 25px;
        }

        select {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            border: 2px solid #edf2f7;
            border-radius: 15px;
            background: #f8fafc;
            color: var(--text);
            appearance: none;
        }

        .spinners-container {
            display: flex;
            gap: 12px;
            height: 200px;
            margin-bottom: 25px;
            position: relative;
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        }

        .spinner {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .spinner::-webkit-scrollbar { display: none; }

        .item {
            height: 66px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--gray);
            scroll-snap-align: center;
            transition: all 0.2s;
        }

        .item.active {
            color: var(--primary);
            font-size: 32px;
            font-weight: bold;
        }

        .btn-save {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 45px;
            display: block;
            margin: 0 auto;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3);
        }
        .btn-save:active { transform: scale(0.92); }
    </style>
</head>
<body>

<div class="widget-card">
    <div class="select-wrapper">
        <select id="cat">
            <option value="Comida">🍔 Comida y Bebida</option>
            <option value="Transporte">🚗 Transporte / Uber</option>
            <option value="Super">🛒 Supermercado</option>
            <option value="Vivienda">🏠 Alquiler / Hogar</option>
            <option value="Entretenimiento">🎬 Ocio y Cine</option>
            <option value="Salud">💊 Salud y Farmacia</option>
            <option value="Servicios">💡 Luz / Agua / Internet</option>
            <option value="Suscripciones">📱 Netflix / Spotify</option>
            <option value="Regalos">🎁 Regalos / Otros</option>
            <option value="Ahorro">💰 Inversión / Ahorro</option>
        </select>
    </div>

    <div class="spinners-container">
        <div class="spinner" id="sp-miles"></div>
        <div class="spinner" id="sp-units"></div>
    </div>

    <button class="btn-save" onclick="save()">+</button>
</div>

<script>
    const setupSpinner = (id, max, step, suffix = "") => {
        const el = document.getElementById(id);
        el.innerHTML = '<div class="item"></div>'; // Spacer
        for(let i=0; i<=max; i+=step) {
            const val = i === 0 && suffix === "00" ? "000" : i + suffix;
            el.innerHTML += `<div class="item" data-val="${i}">${val}</div>`;
        }
        el.innerHTML += '<div class="item"></div>'; // Spacer

        el.onscroll = () => {
            const items = el.querySelectorAll('.item');
            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                const mid = window.innerHeight / 2; // Simplificado para el centro
                const boxMid = el.getBoundingClientRect().top + 100;
                if(Math.abs(rect.top + 33 - boxMid) < 30) item.classList.add('active');
                else item.classList.remove('active');
            });
        };
    };

    setupSpinner('sp-miles', 50, 1, "k");
    setupSpinner('sp-units', 900, 100);

    function save() {
        const m = document.querySelector('#sp-miles .active')?.dataset.val || 0;
        const u = document.querySelector('#sp-units .active')?.dataset.val || 0;
        const total = (m * 1000) + parseInt(u);
        const cat = document.getElementById('cat').value;
        if(total > 0) alert(`Registrado en ${cat}: $${total.toLocaleString()}`);
    }
</script>
</body>
</html>
