         <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gastos Flash Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ecc71">
    <style>
        :root { --bg: #f0f2f5; --primary: #2ecc71; --text: #1a1a1a; --card: #ffffff; --gray: #95a5a6; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .widget-card { background: var(--card); width: 90%; max-width: 360px; padding: 25px; border-radius: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        
        select, .amount-input { width: 100%; padding: 14px; font-size: 18px; border: 2px solid #edf2f7; border-radius: 12px; background: #f8fafc; color: var(--text); box-sizing: border-box; text-align: center; }
        .amount-input { margin-top: 10px; font-weight: bold; color: var(--primary); border-color: var(--primary); }
        
        .spinners-container { display: flex; gap: 10px; height: 160px; margin: 15px 0; position: relative; mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent); -webkit-mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent); }
        .spinner { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .spinner::-webkit-scrollbar { display: none; }
        .item { height: 53px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gray); scroll-snap-align: center; transition: all 0.2s; }
        .item.active { color: var(--primary); font-size: 28px; font-weight: bold; }
        
        .btn-save { width: 70px; height: 70px; background: var(--primary); border: none; border-radius: 50%; color: white; font-size: 35px; cursor: pointer; margin-top: 15px; box-shadow: 0 8px 20px rgba(46,204,113,0.3); }
        .btn-save:disabled { background: var(--gray); }
    </style>
</head>
<body>

<div class="widget-card">
    <select id="cat">
        <option value="Comida">🍔 Comida</option>
        <option value="Transporte">🚗 Transporte</option>
        <option value="Super">🛒 Supermercado</option>
        <option value="Hogar">🏠 Hogar</option>
        <option value="Ocio">🎬 Ocio</option>
        <option value="Salud">💊 Salud</option>
        <option value="Servicios">💡 Servicios</option>
        <option value="Suscripciones">📱 Suscripciones</option>
        <option value="Ahorro">💰 Ahorro</option>
        <option value="Otros">🎁 Otros</option>
    </select>

    <div class="spinners-container">
        <div class="spinner" id="sp-miles"></div>
        <div class="spinner" id="sp-units"></div>
    </div>

    <input type="number" id="final-amount" class="amount-input" placeholder="Monto total">

    <button class="btn-save" id="btn" onclick="save()">+</button>
</div>

<script>
    const inputAmount = document.getElementById('final-amount');
    
    const setupSpinner = (id, max, step, suffix = "") => {
        const el = document.getElementById(id);
        el.innerHTML = '<div class="item"></div>';
        for(let i=0; i<=max; i+=step) {
            const display = i === 0 && suffix === "00" ? "000" : i + suffix;
            el.innerHTML += `<div class="item" data-val="${i}">${display}</div>`;
        }
        el.innerHTML += '<div class="item"></div>';

        el.onscroll = () => {
            const items = el.querySelectorAll('.item[data-val]');
            const boxMid = el.getBoundingClientRect().top + (el.offsetHeight / 2);
            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                if(Math.abs(rect.top + (rect.height/2) - boxMid) < 25) {
                    item.classList.add('active');
                    updateTotal();
                } else item.classList.remove('active');
            });
        };
    };

    function updateTotal() {
        const m = document.querySelector('#sp-miles .active')?.dataset.val || 0;
        const u = document.querySelector('#sp-units .active')?.dataset.val || 0;
        inputAmount.value = (m * 1000) + parseInt(u);
    }

    setupSpinner('sp-miles', 50, 1, "k");
    setupSpinner('sp-units', 900, 100);

    async function save() {
        const btn = document.getElementById('btn');
        const total = inputAmount.value;
        const cat = document.getElementById('cat').value;
        
        if(total <= 0) return alert("Ingresa un monto");

        btn.disabled = true;
        btn.innerText = "...";

        // URL de tu Google Apps Script (La obtendrás en el siguiente paso)
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzeTmUEvCNvCOFgTQZvbS5kbxdv010APkWLfMVwVXDg12B9R-a73FNI2_XHQ6FWZlRw/exec";

        try {
            await fetch(URL_SCRIPT, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ categoria: cat, monto: total, fecha: new Date().toLocaleString() })
            });
            alert("¡Guardado en la nube!");
        } catch (e) {
            alert("Error al guardar");
        } finally {
            btn.disabled = false;
            btn.innerText = "+";
        }
    }
</script>
</body>
</html>
