<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gastos Flash Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ecc71">
    <style>
        :root { --bg: #f0f2f5; --primary: #2ecc71; --text: #1a1a1a; --card: #ffffff; --gray: #95a5a6; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: manipulation; }
        
        .widget-card { background: var(--card); width: 90%; max-width: 360px; padding: 25px; border-radius: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        
        select, .amount-input { width: 100%; padding: 14px; font-size: 18px; border: 2px solid #edf2f7; border-radius: 12px; background: #f8fafc; color: var(--text); box-sizing: border-box; text-align: center; outline: none; }
        .amount-input { margin-top: 10px; font-weight: bold; color: var(--primary); border-color: var(--primary); transition: all 0.3s; }
        
        .spinners-container { display: flex; gap: 10px; height: 160px; margin: 15px 0; position: relative; mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent); -webkit-mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent); }
        .spinner { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -ms-overflow-style: none; }
        .spinner::-webkit-scrollbar { display: none; }
        .item { height: 53px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gray); scroll-snap-align: center; transition: all 0.2s; }
        .item.active { color: var(--primary); font-size: 28px; font-weight: bold; }
        
        .btn-save { width: 75px; height: 75px; background: var(--primary); border: none; border-radius: 50%; color: white; font-size: 40px; cursor: pointer; margin-top: 15px; box-shadow: 0 8px 20px rgba(46,204,113,0.3); transition: transform 0.1s; }
        .btn-save:active { transform: scale(0.9); }
        .btn-save:disabled { background: var(--gray); opacity: 0.7; }

        .progress-container { margin-top: 20px; text-align: left; }
        .progress-label { font-size: 13px; color: var(--gray); display: flex; justify-content: space-between; margin-bottom: 5px; }
        .progress-bar { width: 100%; height: 8px; background: #edf2f7; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.8s ease-in-out; }
    </style>
</head>
<body>

<div class="widget-card">
    <select id="cat">
        <option value="Comida">🍔 Comida y Bebida</option>
        <option value="Transporte">🚗 Transporte / Uber</option>
        <option value="Super">🛒 Supermercado</option>
        <option value="Hogar">🏠 Alquiler / Hogar</option>
        <option value="Ocio">🎬 Ocio y Cine</option>
        <option value="Salud">💊 Salud y Farmacia</option>
        <option value="Servicios">💡 Luz / Agua / Gas</option>
        <option value="Suscripciones">📱 Netflix / Spotify</option>
        <option value="Ahorro">💰 Inversión / Ahorro</option>
        <option value="Otros">🎁 Regalos / Otros</option>
    </select>

    <div class="spinners-container">
        <div class="spinner" id="sp-miles"></div>
        <div class="spinner" id="sp-units"></div>
    </div>

    <input type="number" id="final-amount" class="amount-input" placeholder="Monto total">

    <button class="btn-save" id="btn" onclick="save()">+</button>

    <div class="progress-container">
        <div class="progress-label">
            <span>Gasto mensual</span>
            <span id="perc">0%</span>
        </div>
        <div class="progress-bar">
            <div id="fill" class="progress-fill"></div>
        </div>
        <p id="total-txt" style="font-size: 11px; color: var(--gray); margin-top: 5px;">Meta: $2,000,000</p>
    </div>
</div>

<script>
    const inputAmount = document.getElementById('final-amount');
    const PRESUPUESTO = 2000000; 
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbybpA8DCRhmZb0kJnTAC9apEhjdGWeClLPHIn10jATZNTEgmBRJHDwWpZgq6Vok7G_4/exec";

    // Configuración de los Spinners
    const setupSpinner = (id, max, step, suffix = "") => {
        const el = document.getElementById(id);
        el.innerHTML = '<div class="item"></div>'; // Espaciador inicial
        for(let i=0; i<=max; i+=step) {
            const display = i === 0 && suffix === "00" ? "000" : i + suffix;
            el.innerHTML += `<div class="item" data-val="${i}">${display}</div>`;
        }
        el.innerHTML += '<div class="item"></div>'; // Espaciador final

        el.onscroll = () => {
            const items = el.querySelectorAll('.item[data-val]');
            const boxMid = el.getBoundingClientRect().top + (el.offsetHeight / 2);
            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                if(Math.abs(rect.top + (rect.height/2) - boxMid) < 25) {
                    item.classList.add('active');
                    updateTotal();
                } else {
                    item.classList.remove('active');
                }
            });
        };
    };

    function updateTotal() {
        const m = document.querySelector('#sp-miles .active')?.dataset.val || 0;
        const u = document.querySelector('#sp-units .active')?.dataset.val || 0;
        inputAmount.value = (parseInt(m) * 1000) + parseInt(u);
    }

    // Inicializar spinners
    setupSpinner('sp-miles', 50, 1, "k");
    setupSpinner('sp-units', 900, 100);

    // Función de Guardado
    async function save() {
        const btn = document.getElementById('btn');
        const monto = inputAmount.value;
        const categoria = document.getElementById('cat').value;
        
        if(!monto || monto <= 0) return alert("Selecciona un monto");

        btn.disabled = true;
        btn.innerHTML = "⏳";

        try {
            // Nota: Usamos mode: 'no-cors' para evitar bloqueos en Brave/Chrome. 
            // Esto guardará el dato aunque no podamos leer la respuesta JSON de vuelta.
            await fetch(URL_SCRIPT, {
                method: "POST",
                mode: "no-cors",
                cache: "no-cache",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ categoria: categoria, monto: monto })
            });

            alert("¡Gasto registrado con éxito!");
            inputAmount.value = "";
            
        } catch (e) {
            alert("Error de red: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = "+";
        }
    }
</script>
</body>
</html>
